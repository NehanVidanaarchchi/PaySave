name: pay_save
description: A premium personal finance planner, saving goal, bill reminder, and installment reminder app.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1

  # State management
  provider: ^6.1.5+1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.0.0

  # Charts
  fl_chart: ^1.2.0

  # Local notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/